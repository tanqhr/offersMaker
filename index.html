<script>
    let prices = {};
let items = [];

fetch('./prices.json')
.then(r => r.json())
.then(data => {
    prices = data;
    loadCategories();
});




function loadCategories() {
    let cat = document.getElementById("category");
    cat.innerHTML = "";

    Object.keys(prices).forEach(c => {
        let opt = document.createElement("option");
        opt.value = c;
        opt.innerText = c;
        cat.appendChild(opt);
    });

    loadSub();
}

function loadSub() {
    let cat = document.getElementById("category").value;
    let sub = document.getElementById("sub");

    sub.innerHTML = "";

    Object.keys(prices[cat]).forEach(s => {
        let opt = document.createElement("option");
        opt.value = s;
        opt.innerText = s + " (" + prices[cat][s] + " лв)";
        sub.appendChild(opt);
    });
}

function add() {
    let cat = document.getElementById("category").value;
    let sub = document.getElementById("sub").value;
    let qty = parseFloat(document.getElementById("qty").value || 0);

    let price = prices[cat][sub];

    items.push({ cat, sub, qty, price });

    render();
}

    document.getElementById("total").innerText = total;

function arrayBufferToBase64(buffer) {
    let binary = '';
    let bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return window.btoa(binary);
}

function generatePDF() {

    let clientName = document.getElementById("clientName").value || "-";
    let clientAddress = document.getElementById("clientAddress").value || "-";
    let note = document.getElementById("note").value || "";

    let today = new Date();
    let dateStr = today.toLocaleDateString("bg-BG");
    let offerNumber = "OF-" + Date.now();

    let grouped = {};
    let categoryTotals = {};
    let total = 0;

    items.forEach(i => {
        if (!grouped[i.cat]) grouped[i.cat] = [];
        grouped[i.cat].push(i);

        if (!categoryTotals[i.cat]) categoryTotals[i.cat] = 0;
        categoryTotals[i.cat] += i.qty * i.price;

        total += i.qty * i.price;
    });

    let content = [];

    // 🏢 HEADER
    content.push({
        text: 'ТА ЕНД КО "ЕООД"',
        style: 'header',
        alignment: 'center',
        margin: [0, 0, 0, 5]
    });

    content.push({
        text: 'СТРОИТЕЛНИ И РЕМОНТНИ ДЕЙНОСТИ',
        alignment: 'center',
        margin: [0, 0, 0, 10]
    });

    content.push({
        text: `ОФЕРТА №: ${offerNumber}`,
        alignment: 'center'
    });

    content.push({
        text: `Дата: ${dateStr}`,
        alignment: 'center',
        margin: [0, 0, 0, 10]
    });

    // 👤 CLIENT BOX
    content.push({
        table: {
            widths: ['*'],
            body: [
                [
                    {
                        text: `Клиент: ${clientName}\nАдрес: ${clientAddress}`,
                        margin: [10, 5, 10, 5]
                    }
                ]
            ]
        },
        layout: 'lightHorizontalLines',
        margin: [0, 0, 0, 10]
    });

    // 📦 ITEMS TABLE (PREMIUM)
    let tableBody = [
        [
            { text: 'Категория', style: 'tableHeader' },
            { text: 'Описание', style: 'tableHeader' },
            { text: 'Кол.', style: 'tableHeader' },
            { text: 'Ед. цена', style: 'tableHeader' },
            { text: 'Общо', style: 'tableHeader' }
        ]
    ];

    Object.keys(grouped).forEach(cat => {

        grouped[cat].forEach((i, index) => {

            tableBody.push([
                index === 0 ? { text: cat, rowSpan: grouped[cat].length, bold: true } : {},
                i.sub,
                i.qty,
                i.price.toFixed(2),
                (i.qty * i.price).toFixed(2)
            ]);
        });

        tableBody.push([
            { text: `Общо за ${cat}`, colSpan: 4, bold: true, alignment: 'right' },
            {},
            {},
            {},
            { text: categoryTotals[cat].toFixed(2), bold: true }
        ]);

    });

    content.push({
        table: {
            headerRows: 1,
            widths: ['*', '*', 40, 60, 70],
            body: tableBody
        },
        layout: {
            fillColor: function (rowIndex) {
                return rowIndex === 0 ? '#eeeeee' : null;
            }
        }
    });

    // 💰 TOTAL
    content.push({
        text: `\nОБЩА СУМА: ${total.toFixed(2)} лв`,
        style: 'total',
        alignment: 'right',
        margin: [0, 10, 0, 10]
    });

    // 📝 NOTE
    if (note.trim() !== "") {
        content.push({
            text: `Забележка: ${note}`,
            margin: [0, 10, 0, 0]
        });
    }

    // 📄 PDF
    // pdfMake.createPdf({
    //     content: content,
    //     styles: {
    //         header: { fontSize: 18, bold: true },
    //         tableHeader: { bold: true, fillColor: '#2c3e50', color: 'white' },
    //         total: { fontSize: 14, bold: true }
    //     }
    // }).download(offerNumber + ".pdf");
    pdfMake.createPdf({
    pageSize: 'A4',
    pageMargins: [20, 20, 20, 20],
    pageOrientation: 'portrait',

    content: content,

    styles: {
        header: {
            fontSize: 18,
            bold: true
        },

        tableHeader: {
            bold: true,
            fillColor: '#2c3e50',
            color: 'white'
        },

        total: {
            fontSize: 14,
            bold: true
        }
    }
}).download(offerNumber + ".pdf");
}
    

// 

    function getColor(cat) {
        switch(cat.toLowerCase()) {
            case "баня": return [52,152,219];
            case "ел": return [241,196,15];
            case "вик": return [46,204,113];
            default: return [149,165,166];
        }
    

    Object.keys(grouped).forEach(cat => {

        let color = getColor(cat);

        doc.setFillColor(...color);
        doc.rect(10, y - 5, pageWidth - 20, 10, "F");

        doc.setTextColor(255,255,255);
        doc.setFontSize(12);
        doc.text(cat, 12, y);

        y += 10;

        doc.setTextColor(0,0,0);

        grouped[cat].forEach(i => {

            let lineTotal = i.qty * i.price;
            total += lineTotal;

            doc.text(`• ${i.sub}`, 12, y);
            doc.text(String(i.qty), 90, y);
            doc.text(i.price.toFixed(2), 130, y);
            doc.text(lineTotal.toFixed(2), 165, y);

            y += 6;

            if (y > 260) {
                doc.addPage();
                y = 20;
            }
        });

        doc.setFont(undefined, "bold");
        doc.text(`Общо за ${cat}: ${categoryTotals[cat].toFixed(2)} лв`, 12, y);
        doc.setFont(undefined, "normal");

        y += 10;
        doc.line(10, y, pageWidth - 10, y);
        y += 8;
    });

    // 💰 TOTAL
    doc.setFontSize(14);
    doc.text("ОБЩА СУМА:", 130, y);
    doc.text(total.toFixed(2) + " лв", 165, y);

    y += 12;

    // 📝 NOTE
    if (note.trim() !== "") {
        doc.setFontSize(11);
        doc.text("Забележка:", 10, y);
        y += 6;

        let split = doc.splitTextToSize(note, pageWidth - 20);
        doc.text(split, 10, y);

        y += split.length * 6;
    }

    doc.save(offerNumber + ".pdf");
